services:
  - type: web
    name: easy-easy
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.enableCORS=false --server.enableXsrfProtection=false --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
