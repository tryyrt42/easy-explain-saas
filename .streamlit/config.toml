[theme]
# 전체 테마를 다크 모드로 강제 고정
base="dark"

# 체크박스, 선택된 메뉴 등의 기본 포인트 컬러 (퍼플 블루 톤)
primaryColor="#818cf8"

# 배경색을 아주 딥한 네이비 톤으로 설정 (완전 까만색보다 훨씬 고급스럽습니다)
backgroundColor="#0f172a"
secondaryBackgroundColor="#1e293b"

# 글자색
textColor="#f8fafc"
font="sans serif"

[client]
# 🔥 우측 상단 툴바 (Share, ⭐, GitHub) 완전 제거
# minimal: 로딩 스피너만 남기고 다 숨김 (Streamlit 공식 방식 - 사이드바 영향 없음)
toolbarMode = "minimal"

# 에러 상세 정보 숨김 (운영 환경용)
showErrorDetails = false

[server]
# 🆕 큰 PDF 업로드 허용 (기본 200MB → 300MB로 명시)
maxUploadSize = 300

# 🆕 WebSocket 메시지 최대 크기 (파일 업로드 시 청크 단위 전송에 영향)
maxMessageSize = 300

# CORS 비활성 (Render 환경에서 권장)
enableCORS = false
enableXsrfProtection = false
